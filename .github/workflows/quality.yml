name: Quality Checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Test, Lint, Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1 xvfb libxkbcommon-x11-0 libxcb-iccc4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libxcb-cursor0

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt -r requirements-dev.txt

      - name: Run pytest
        working-directory: backend
        run: xvfb-run -a pytest tests -q

      - name: Ruff
        run: ruff check backend --select E,F,E722

      - name: Pyright
        run: pyright backend
