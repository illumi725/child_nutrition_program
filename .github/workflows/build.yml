name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # -----------------------------------------------------------
  # LINUX BUILD
  # -----------------------------------------------------------
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject secrets
        working-directory: backend
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          DB_HOST_PROD:        ${{ secrets.DB_HOST_PROD }}
          DB_USERNAME_PROD:    ${{ secrets.DB_USERNAME_PROD }}
          DB_PASSWORD_PROD:    ${{ secrets.DB_PASSWORD_PROD }}
          DB_DATABASE_PROD:    ${{ secrets.DB_DATABASE_PROD }}
          DB_PORT_PROD:        ${{ secrets.DB_PORT_PROD }}
          APP_VERSION_TAG:     ${{ github.ref_name }}
        run: |
          echo "$CLIENT_SECRETS_JSON" > client_secrets.json
          python scripts/inject_config.py

      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller hapag_comparator.spec

      - name: Compress output
        run: |
          tar -czvf hapag_comparator_linux_${{ github.ref_name }}.tar.gz \
            -C backend/dist/hapag_comparator .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: hapag_comparator_linux_*.tar.gz

  # -----------------------------------------------------------
  # WINDOWS BUILD
  # -----------------------------------------------------------
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject secrets
        working-directory: backend
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          DB_HOST_PROD:        ${{ secrets.DB_HOST_PROD }}
          DB_USERNAME_PROD:    ${{ secrets.DB_USERNAME_PROD }}
          DB_PASSWORD_PROD:    ${{ secrets.DB_PASSWORD_PROD }}
          DB_DATABASE_PROD:    ${{ secrets.DB_DATABASE_PROD }}
          DB_PORT_PROD:        ${{ secrets.DB_PORT_PROD }}
          APP_VERSION_TAG:     ${{ github.ref_name }}
        run: |
          $env:CLIENT_SECRETS_JSON | Out-File -FilePath client_secrets.json -Encoding utf8
          python scripts/inject_config.py

      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller hapag_comparator.spec

      - name: Compress output
        run: |
          Compress-Archive -Path backend\dist\hapag_comparator\* `
            -DestinationPath hapag_comparator_windows_${{ github.ref_name }}.zip

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ github.ref_name }} backend\scripts\windows_setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            hapag_comparator_windows_*.zip
            backend/dist/hapag_comparator_windows_setup_*.exe

  # -----------------------------------------------------------
  # macOS BUILD
  # -----------------------------------------------------------
  build-macos:
    name: Build macOS Executable
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject secrets
        working-directory: backend
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          DB_HOST_PROD:        ${{ secrets.DB_HOST_PROD }}
          DB_USERNAME_PROD:    ${{ secrets.DB_USERNAME_PROD }}
          DB_PASSWORD_PROD:    ${{ secrets.DB_PASSWORD_PROD }}
          DB_DATABASE_PROD:    ${{ secrets.DB_DATABASE_PROD }}
          DB_PORT_PROD:        ${{ secrets.DB_PORT_PROD }}
          APP_VERSION_TAG:     ${{ github.ref_name }}
        run: |
          echo "$CLIENT_SECRETS_JSON" > client_secrets.json
          python scripts/inject_config.py

      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller hapag_comparator.spec

      - name: Compress output
        run: |
          cd backend/dist
          zip -r ../../hapag_comparator_macos_${{ github.ref_name }}.zip hapag_comparator

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG Disk Image
        run: |
          create-dmg \
            --volname "Hapag Comparator" \
            --window-size 500 300 \
            --icon-size 100 \
            --icon "hapag_comparator.app" 125 125 \
            --hide-extension "hapag_comparator.app" \
            --app-drop-link 375 125 \
            "hapag_comparator_macos_${{ github.ref_name }}.dmg" \
            "backend/dist/hapag_comparator.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            hapag_comparator_macos_*.zip
            hapag_comparator_macos_*.dmg

  # -----------------------------------------------------------
  # CREATE GITHUB RELEASE & ATTACH ALL ARTIFACTS
  # -----------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          sha256sum hapag_comparator_linux_*.tar.gz \
            hapag_comparator_windows_*.zip \
            hapag_comparator_macos_*.zip \
            hapag_comparator_macos_*.dmg \
            backend/dist/hapag_comparator_windows_setup_*.exe \
            > checksums.txt 2>/dev/null || true
          cat checksums.txt || echo "no checksums generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            hapag_comparator_linux_*.tar.gz
            hapag_comparator_windows_*.zip
            backend/dist/hapag_comparator_windows_setup_*.exe
            hapag_comparator_macos_*.zip
            hapag_comparator_macos_*.dmg
            checksums.txt
