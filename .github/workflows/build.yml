name: Build Windows & macOS

# Triggered automatically when Bitbucket pushes the tag to this GitHub mirror
on:
  push:
    tags:
      - 'v*'

jobs:
  # ---------------------------------------------------------
  # WINDOWS BUILD (GitHub's free Windows runner)
  # ---------------------------------------------------------
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject secrets
        working-directory: backend
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          DB_HOST_PROD: ${{ secrets.DB_HOST_PROD }}
          DB_USERNAME_PROD: ${{ secrets.DB_USERNAME_PROD }}
          DB_PASSWORD_PROD: ${{ secrets.DB_PASSWORD_PROD }}
          DB_DATABASE_PROD: ${{ secrets.DB_DATABASE_PROD }}
          DB_PORT_PROD: ${{ secrets.DB_PORT_PROD }}
          APP_VERSION_TAG: ${{ github.ref_name }}
        run: |
          $env:CLIENT_SECRETS_JSON | Out-File -FilePath client_secrets.json -Encoding utf8
          python scripts/inject_config.py

      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller hapag_comparator.spec

      - name: Compress output
        run: |
          Compress-Archive -Path backend\dist\hapag_comparator\* -DestinationPath hapag_comparator_windows_${{ github.ref_name }}.zip

      - name: Upload to Bitbucket Downloads
        shell: bash
        env:
          BITBUCKET_USERNAME: ${{ secrets.BITBUCKET_USERNAME }}
          BITBUCKET_APP_PASSWORD: ${{ secrets.BITBUCKET_APP_PASSWORD }}
        run: |
          curl -X POST \
            "https://api.bitbucket.org/2.0/repositories/asa-projects/cnp_desktop_app/downloads" \
            -u "$BITBUCKET_USERNAME:$BITBUCKET_APP_PASSWORD" \
            -F "files=@hapag_comparator_windows_${{ github.ref_name }}.zip"

  # ---------------------------------------------------------
  # macOS BUILD (GitHub's free macOS runner)
  # ---------------------------------------------------------
  build-macos:
    name: Build macOS Executable
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject secrets
        working-directory: backend
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.CLIENT_SECRETS_JSON }}
          DB_HOST_PROD: ${{ secrets.DB_HOST_PROD }}
          DB_USERNAME_PROD: ${{ secrets.DB_USERNAME_PROD }}
          DB_PASSWORD_PROD: ${{ secrets.DB_PASSWORD_PROD }}
          DB_DATABASE_PROD: ${{ secrets.DB_DATABASE_PROD }}
          DB_PORT_PROD: ${{ secrets.DB_PORT_PROD }}
          APP_VERSION_TAG: ${{ github.ref_name }}
        run: |
          echo "$CLIENT_SECRETS_JSON" > client_secrets.json
          python scripts/inject_config.py

      - name: Build with PyInstaller
        working-directory: backend
        run: pyinstaller hapag_comparator.spec

      - name: Compress output
        run: |
          cd backend/dist
          zip -r ../../hapag_comparator_macos_${{ github.ref_name }}.zip hapag_comparator.app

      - name: Upload to Bitbucket Downloads
        env:
          BITBUCKET_USERNAME: ${{ secrets.BITBUCKET_USERNAME }}
          BITBUCKET_APP_PASSWORD: ${{ secrets.BITBUCKET_APP_PASSWORD }}
        run: |
          curl -X POST \
            "https://api.bitbucket.org/2.0/repositories/asa-projects/cnp_desktop_app/downloads" \
            -u "$BITBUCKET_USERNAME:$BITBUCKET_APP_PASSWORD" \
            -F "files=@hapag_comparator_macos_${{ github.ref_name }}.zip"
