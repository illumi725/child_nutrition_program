name: Build Executables

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: hapag_comparator
            asset_name: hapag-comparator-linux
          - os: windows-latest
            artifact_name: hapag_comparator.exe
            asset_name: hapag-comparator-windows
          - os: macos-latest
            artifact_name: hapag_comparator
            asset_name: hapag-comparator-macos

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      working-directory: ./backend
      run: pyinstaller --clean -y hapag_comparator.spec

    - name: Package Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path backend/dist/hapag_comparator/* -DestinationPath ${{ matrix.asset_name }}.zip

    - name: Package Artifacts (Linux/Mac)
      if: matrix.os != 'windows-latest'
      run: |
        cd backend/dist/hapag_comparator
        zip -r ../../../${{ matrix.asset_name }}.zip ./*

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.asset_name }}.zip
