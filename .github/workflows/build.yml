name: Build Executables

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write    # Required to upload assets to GitHub Releases

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: hapag-comparator-linux
          - os: windows-latest
            asset_name: hapag-comparator-windows
          - os: macos-latest
            asset_name: hapag-comparator-macos

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pyinstaller

    - name: Inject production credentials
      working-directory: ./backend
      env:
        DB_HOST_PROD: ${{ secrets.DB_HOST_PROD }}
        DB_USERNAME_PROD: ${{ secrets.DB_USERNAME_PROD }}
        DB_PASSWORD_PROD: ${{ secrets.DB_PASSWORD_PROD }}
        DB_DATABASE_PROD: ${{ secrets.DB_DATABASE_PROD }}
        DB_PORT_PROD: ${{ secrets.DB_PORT_PROD }}
        APP_VERSION_TAG: ${{ github.ref_name }}
      run: python scripts/inject_config.py

    - name: Inject Google SSO client secrets
      working-directory: ./backend
      shell: bash
      env:
        GOOGLE_CLIENT_SECRETS: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}
      run: echo "$GOOGLE_CLIENT_SECRETS" > client_secrets.json

    - name: Build with PyInstaller
      working-directory: ./backend
      run: pyinstaller --clean -y hapag_comparator.spec

    - name: Package Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: Compress-Archive -Path backend/dist/hapag_comparator/* -DestinationPath ${{ matrix.asset_name }}.zip

    - name: Package Artifacts (Linux/Mac)
      if: matrix.os != 'windows-latest'
      run: |
        cd backend/dist/hapag_comparator
        zip -r ../../../${{ matrix.asset_name }}.zip ./*

    - name: Upload Build Artifact (dev preview)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: ${{ matrix.asset_name }}.zip

    - name: Upload to GitHub Release (on version tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
