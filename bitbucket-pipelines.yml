image: python:3.12

pipelines:
  tags:
    v*:
      - parallel:
          # ---------------------------------------------------
          # 1. LINUX BUILD (Bitbucket free cloud runner)
          # ---------------------------------------------------
          - step:
              name: Build Linux Executable
              caches:
                - pip
              script:
                - cd backend
                - pip install -r requirements.txt
                - pip install pyinstaller
                - echo "$CLIENT_SECRETS_JSON" > client_secrets.json
                - export APP_VERSION_TAG=$BITBUCKET_TAG
                - python scripts/inject_config.py
                - pyinstaller hapag_comparator.spec
                - tar -czvf ../hapag_comparator_linux_${BITBUCKET_TAG}.tar.gz -C dist/hapag_comparator .
              artifacts:
                - hapag_comparator_linux_*.tar.gz

          # ---------------------------------------------------
          # 2. MIRROR TAG TO GITHUB
          # This triggers GitHub Actions to build Windows & macOS
          # ---------------------------------------------------
          - step:
              name: Mirror Tag to GitHub (Triggers Win/Mac Builds)
              script:
                - git remote add github https://x-token-auth:${GITHUB_TOKEN}@github.com/asa-projects/cnp_desktop_app.git
                - git push github ${BITBUCKET_TAG}

      # ---------------------------------------------------
      # 3. UPLOAD LINUX BUILD TO BITBUCKET DOWNLOADS
      # (Windows & macOS are uploaded directly by GitHub Actions)
      # ---------------------------------------------------
      - step:
          name: Upload Linux Artifact to Downloads
          script:
            - pipe: atlassian/bitbucket-upload-file:0.3.2
              variables:
                BITBUCKET_USERNAME: $BITBUCKET_USERNAME
                BITBUCKET_APP_PASSWORD: $BITBUCKET_APP_PASSWORD
                FILENAME: 'hapag_comparator_linux_${BITBUCKET_TAG}.tar.gz'