image: python:3.12

pipelines:
  tags:
    v*:
      - parallel:
          # ---------------------------------------------------
          # 1. LINUX BUILD
          # ---------------------------------------------------
          - step:
              name: Build Linux Executable
              caches:
                - pip
              script:
                - cd backend
                - pip install -r requirements.txt
                - pip install pyinstaller
                - echo "$CLIENT_SECRETS_JSON" > client_secrets.json
                - export APP_VERSION_TAG=$BITBUCKET_TAG
                - python scripts/inject_config.py
                - pyinstaller hapag_comparator.spec
                - tar -czvf ../hapag_comparator_linux_${BITBUCKET_TAG}.tar.gz -C dist/hapag_comparator .
              artifacts:
                - hapag_comparator_linux_*.tar.gz

          # ---------------------------------------------------
          # 2. WINDOWS BUILD
          # ---------------------------------------------------
          - step:
              name: Build Windows Executable
              runs-on: 
                - windows
              caches:
                - pip
              script:
                - cd backend
                - pip install -r requirements.txt
                - pip install pyinstaller
                - $env:CLIENT_SECRETS_JSON | Out-File -FilePath client_secrets.json -Encoding utf8
                - $env:APP_VERSION_TAG = $env:BITBUCKET_TAG
                - python scripts/inject_config.py
                - pyinstaller hapag_comparator.spec
                - Compress-Archive -Path dist\hapag_comparator\* -DestinationPath ..\hapag_comparator_windows_${env:BITBUCKET_TAG}.zip
              artifacts:
                - hapag_comparator_windows_*.zip

          # ---------------------------------------------------
          # 3. macOS BUILD
          # ---------------------------------------------------
          - step:
              name: Build macOS Executable
              runs-on: 
                - macos
              caches:
                - pip
              script:
                - cd backend
                - pip install -r requirements.txt
                - pip install pyinstaller
                - echo "$CLIENT_SECRETS_JSON" > client_secrets.json
                - export APP_VERSION_TAG=$BITBUCKET_TAG
                - python scripts/inject_config.py
                - pyinstaller hapag_comparator.spec
                - cd dist
                - zip -r ../../hapag_comparator_macos_${BITBUCKET_TAG}.zip hapag_comparator.app
              artifacts:
                - hapag_comparator_macos_*.zip

      # ---------------------------------------------------
      # 4. UPLOAD TO BITBUCKET DOWNLOADS
      # ---------------------------------------------------
      - step:
          name: Upload Artifacts to Downloads
          script:
            - pipe: atlassian/bitbucket-upload-file:0.3.2
              variables:
                BITBUCKET_USERNAME: $BITBUCKET_USERNAME
                BITBUCKET_APP_PASSWORD: $BITBUCKET_APP_PASSWORD
                FILENAME: 'hapag_comparator_linux_${BITBUCKET_TAG}.tar.gz'
            - pipe: atlassian/bitbucket-upload-file:0.3.2
              variables:
                BITBUCKET_USERNAME: $BITBUCKET_USERNAME
                BITBUCKET_APP_PASSWORD: $BITBUCKET_APP_PASSWORD
                FILENAME: 'hapag_comparator_windows_${BITBUCKET_TAG}.zip'
            - pipe: atlassian/bitbucket-upload-file:0.3.2
              variables:
                BITBUCKET_USERNAME: $BITBUCKET_USERNAME
                BITBUCKET_APP_PASSWORD: $BITBUCKET_APP_PASSWORD
                FILENAME: 'hapag_comparator_macos_${BITBUCKET_TAG}.zip'