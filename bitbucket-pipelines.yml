image: python:3.12

pipelines:
  tags:
    v*:
      - parallel:
          # ---------------------------------------------------
          # 1. LINUX BUILD
          # ---------------------------------------------------
          - step:
              name: Build Linux Executable
              caches:
                - pip
              script:
                - cd backend
                - pip install -r requirements.txt
                - pip install pyinstaller
                - echo "$CLIENT_SECRETS_JSON" > client_secrets.json
                - export APP_VERSION_TAG=$BITBUCKET_TAG
                - python scripts/inject_config.py
                - pyinstaller hapag_comparator.spec
                - tar -czvf ../hapag_comparator_linux_${BITBUCKET_TAG}.tar.gz -C dist/hapag_comparator .
              artifacts:
                - hapag_comparator_linux_*.tar.gz

          # ---------------------------------------------------
          # 2. WINDOWS BUILD (Cross-Compiled via Wine)
          # ---------------------------------------------------
          - step:
              name: Build Windows Executable
              image: tobix/pywine:3.12
              caches:
                - pip
              script:
                - cd backend
                # Install dependencies in the Wine Windows environment
                - wine python -m pip install -r requirements.txt
                - wine python -m pip install pyinstaller
                - echo "$CLIENT_SECRETS_JSON" > client_secrets.json
                - export APP_VERSION_TAG=$BITBUCKET_TAG
                - wine python scripts/inject_config.py
                - wine pyinstaller hapag_comparator.spec
                # Compress the output using Python's built-in zip module
                - wine python -m zipfile -c ../hapag_comparator_windows_${BITBUCKET_TAG}.zip dist/hapag_comparator/
              artifacts:
                - hapag_comparator_windows_*.zip

      # ---------------------------------------------------
      # 3. UPLOAD TO BITBUCKET DOWNLOADS
      # ---------------------------------------------------
      - step:
          name: Upload Artifacts to Downloads
          script:
            - pipe: atlassian/bitbucket-upload-file:0.3.2
              variables:
                BITBUCKET_USERNAME: $BITBUCKET_USERNAME
                BITBUCKET_APP_PASSWORD: $BITBUCKET_APP_PASSWORD
                FILENAME: 'hapag_comparator_linux_${BITBUCKET_TAG}.tar.gz'
            - pipe: atlassian/bitbucket-upload-file:0.3.2
              variables:
                BITBUCKET_USERNAME: $BITBUCKET_USERNAME
                BITBUCKET_APP_PASSWORD: $BITBUCKET_APP_PASSWORD
                FILENAME: 'hapag_comparator_windows_${BITBUCKET_TAG}.zip'